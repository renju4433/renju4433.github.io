<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操控赛果 - 荷官发牌系统</title>
    <style>
        body {
            background-color: #2e3b32;
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #d4af37; margin-bottom: 5px;}
        .subtitle { color: #aaa; margin-bottom: 30px; font-size: 14px; }
        
        .board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .panel {
            background-color: #1e2620;
            border: 2px solid #4a5c4f;
            border-radius: 10px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .panel h2 {
            border-bottom: 1px solid #4a5c4f;
            padding-bottom: 10px;
            margin-top: 0;
            color: #d4af37;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            margin: 15px 0;
            padding: 10px;
            background-color: #27332b;
            border-radius: 5px;
        }

        .hidden-val {
            color: #27332b;
            background-color: #4a5c4f;
            padding: 0 15px;
            border-radius: 5px;
            user-select: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .revealed {
            color: #fff;
            background-color: transparent;
            font-weight: bold;
            text-shadow: none;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            background-color: #d4af37;
            color: #111;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { background-color: #f1c40f; transform: scale(1.05); }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        .btn-start { background-color: #e74c3c; color: white; width: 100%; margin-bottom: 10px; }
        .btn-start:hover:not(:disabled) { background-color: #c0392b; }
        .btn-showdown { background-color: #3498db; color: white;}
        .btn-showdown:hover:not(:disabled) { background-color: #2980b9;}
    </style>
</head>
<body>

    <h1>《操控赛果》荷官系统</h1>
    <div class="subtitle">单循环赛积分博弈 (胜3 平1 负0)</div>

    <div class="board">
        <!-- 积分公布区 -->
        <div class="panel">
            <h2>队伍积分 (线索区)</h2>
            <div class="item-row"><span>A队 积分:</span> <span id="pts-A" class="hidden-val">?</span></div>
            <div class="item-row"><span>B队 积分:</span> <span id="pts-B" class="hidden-val">?</span></div>
            <div class="item-row"><span>C队 积分:</span> <span id="pts-C" class="hidden-val">?</span></div>
            <div class="item-row"><span>D队 积分:</span> <span id="pts-D" class="hidden-val">?</span></div>
        </div>

        <!-- 赛果公布区 -->
        <div class="panel">
            <h2>真实赛果 (验牌区)</h2>
            <div class="item-row"><span>A vs B</span> <span id="res-AB" class="hidden-val">?</span></div>
            <div class="item-row"><span>A vs C</span> <span id="res-AC" class="hidden-val">?</span></div>
            <div class="item-row"><span>A vs D</span> <span id="res-AD" class="hidden-val">?</span></div>
            <div class="item-row"><span>B vs C</span> <span id="res-BC" class="hidden-val">?</span></div>
            <div class="item-row"><span>B vs D</span> <span id="res-BD" class="hidden-val">?</span></div>
            <div class="item-row"><span>C vs D</span> <span id="res-CD" class="hidden-val">?</span></div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-init" class="btn-start" onclick="initGame()">开始新局 (直接开A队积分)</button>
        <button id="btn-turn" disabled onclick="revealTurn()">第二轮 (开B队)</button>
        <button id="btn-river" disabled onclick="revealRiver()">第三轮 (开C队)</button>
        <button id="btn-d" disabled onclick="revealD()">终局圈 (开D队)</button>
        <button id="btn-showdown" class="btn-showdown" disabled onclick="revealShowdown()">验牌 (全开赛果)</button>
    </div>

    <script>
        const matches = [
            { id: 'AB', t1: 'A', t2: 'B' }, { id: 'AC', t1: 'A', t2: 'C' }, { id: 'AD', t1: 'A', t2: 'D' },
            { id: 'BC', t1: 'B', t2: 'C' }, { id: 'BD', t1: 'B', t2: 'D' }, { id: 'CD', t1: 'C', t2: 'D' }
        ];
        
        let teamPoints = { A: 0, B: 0, C: 0, D: 0 };
        let matchResultsText = {}; 

        function initGame() {
            // 1. 数据清零
            teamPoints = { A: 0, B: 0, C: 0, D: 0 };
            matchResultsText = {};

            // 2. 生成随机赛果
            matches.forEach(m => {
                const rand = Math.floor(Math.random() * 3);
                if (rand === 0) {
                    teamPoints[m.t1] += 3;
                    matchResultsText[m.id] = `${m.t1} 胜`;
                } else if (rand === 1) {
                    teamPoints[m.t1] += 1;
                    teamPoints[m.t2] += 1;
                    matchResultsText[m.id] = `平 局`;
                } else {
                    teamPoints[m.t2] += 3;
                    matchResultsText[m.id] = `${m.t2} 胜`;
                }
            });

            // 3. UI 隐藏除A队外的所有信息
            document.querySelectorAll('.hidden-val').forEach(el => {
                el.classList.remove('revealed');
                el.innerText = '?';
            });

            // 4. 立即开 A 队
            revealElement('pts-A', teamPoints.A + ' 分');

            // 5. 按钮状态切换
            document.getElementById('btn-init').innerText = "重新发牌";
            document.getElementById('btn-turn').disabled = false;
            document.getElementById('btn-river').disabled = true;
            document.getElementById('btn-d').disabled = true;
            document.getElementById('btn-showdown').disabled = true;
            
            alert("新局已开始，A队积分已揭晓！\n请所有人根据A队积分写下 6 场预测，写完后进行首轮下注。");
        }

        function revealElement(id, text) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.classList.add('revealed');
        }

        function revealTurn() {
            revealElement('pts-B', teamPoints.B + ' 分');
            document.getElementById('btn-turn').disabled = true;
            document.getElementById('btn-river').disabled = false;
        }

        function revealRiver() {
            revealElement('pts-C', teamPoints.C + ' 分');
            document.getElementById('btn-river').disabled = true;
            document.getElementById('btn-d').disabled = false;
        }

        function revealD() {
            revealElement('pts-D', teamPoints.D + ' 分');
            document.getElementById('btn-d').disabled = true;
            document.getElementById('btn-showdown').disabled = false;
        }

        function revealShowdown() {
            matches.forEach(m => {
                revealElement(`res-${m.id}`, matchResultsText[m.id]);
            });
            document.getElementById('btn-showdown').disabled = true;
        }
    </script>
</body>
</html>
