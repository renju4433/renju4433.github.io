<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTO Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tabs">
        <button id="tab-sim" class="active">发牌模拟器</button>
        <button id="tab-equity">胜率计算器</button>
        <button id="tab-gto">GTO 求解器 (CFR)</button>
    </div>

    <div class="settings-bar" style="text-align: center; margin-bottom: 24px;">
        <label for="rule-mode" style="font-weight: bold; color: #333; margin-right: 8px;">玩法规则：</label>
        <select id="rule-mode" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; outline: none; cursor: pointer;">
            <option value="rule5">规则 A: 5张公共牌 (7选5, 比公约数数量和高牌)</option>
            <option value="rule3">规则 B: 3张公共牌 (5选3, 先比GCD, 再比高牌)</option>
        </select>
    </div>

    <!-- 发牌模拟器 -->
    <div id="view-sim" class="view active">
        <div class="controls">
        <button id="btn-start">开始发牌</button>
        <button id="btn-community" disabled>翻公共牌</button>
        <button id="btn-calc" disabled>计算胜负</button>
    </div>

    <div class="section">
        <h2>公共牌</h2>
        <div class="card-container" id="community-cards">
            <div class="card empty"></div>
            <div class="card empty"></div>
            <div class="card empty"></div>
            <div class="card empty"></div>
            <div class="card empty"></div>
        </div>
    </div>

    <div class="section">
        <h2>玩家</h2>
        <div class="players-container" id="players">
            <!-- 玩家 1 -->
            <div class="player-box" id="player-1">
                <h2>玩家 1</h2>
                <div class="card-container" id="p1-cards">
                    <div class="card empty"></div>
                    <div class="card empty"></div>
                </div>
                <div class="status" id="p1-status"></div>
                <div class="best-combo" id="p1-best-combo">
                    <h3>最优组合</h3>
                    <div class="card-container" id="p1-best-cards"></div>
                </div>
            </div>

            <!-- 玩家 2 -->
            <div class="player-box" id="player-2">
                <h2>玩家 2</h2>
                <div class="card-container" id="p2-cards">
                    <div class="card empty"></div>
                    <div class="card empty"></div>
                </div>
                <div class="status" id="p2-status"></div>
                <div class="best-combo" id="p2-best-combo">
                    <h3>最优组合</h3>
                    <div class="card-container" id="p2-best-cards"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="result-banner" id="result-banner">
        <!-- 胜负结果将在此显示 -->
    </div>
    </div>

    <!-- 胜率计算器 -->
    <div id="view-equity" class="view" style="display: none;">
        <div class="gto-controls">
            <div class="input-group">
                <label>玩家1 手牌 (2张, 2-53):</label>
                <input type="text" id="eq-p1" value="2, 4">
            </div>
            <div class="input-group">
                <label>玩家2 手牌 (2张, 2-53):</label>
                <input type="text" id="eq-p2" value="3, 5">
            </div>
            <div class="input-group">
                <label>公共牌 (用逗号分隔):</label>
                <input type="text" id="eq-comm" value="10, 20, 30" placeholder="规则A: 0-5张 / 规则B: 0-3张">
            </div>
            <button id="btn-calc-eq">计算胜率</button>
        </div>

        <div id="eq-progress-container" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="eq-progress-fill"></div>
            </div>
            <div class="progress-text" id="eq-progress-text">0%</div>
        </div>

        <div id="eq-result" style="display: none; margin-top: 32px;">
            <div class="players-container" id="eq-players-container">
                <!-- 胜率和补牌结果渲染到这里 -->
            </div>
        </div>
    </div>

    <!-- GTO 求解器 -->
    <div id="view-gto" class="view" style="display: none;">
        <div class="gto-controls">
            <div class="input-group">
                <label>公共牌 (用逗号分隔, 2-53):</label>
                <input type="text" id="gto-community" value="10, 20, 30" placeholder="规则A: 5张 / 规则B: 3张">
            </div>
            <div class="input-group">
                <label>底池:</label>
                <input type="number" id="gto-pot" value="100">
            </div>
            <div class="input-group">
                <label>下注尺度:</label>
                <input type="number" id="gto-bet" value="50">
            </div>
            <button id="btn-solve">求解 GTO</button>
        </div>

        <div id="gto-progress-container" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="gto-progress-fill"></div>
            </div>
            <div class="progress-text" id="gto-progress-text">0%</div>
        </div>

        <div class="table-container">
            <table id="gto-table">
                <thead>
                    <tr>
                        <th>底牌</th>
                        <th>牌型</th>
                        <th>P1 动作</th>
                        <th>P2 面向 Bet</th>
                        <th>P2 面向 Check</th>
                        <th>P1 面向 Bet</th>
                    </tr>
                </thead>
                <tbody id="gto-tbody">
                    <!-- 结果行 -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
